services:
  - type: web
    name: zorvyn-finance-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: AUTO_RUN_MIGRATIONS
        value: "true"
      - key: AUTH_RATE_LIMIT_REQUESTS
        value: "30"
      - key: AUTH_RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: JWT_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
